name: varejo_analytics
version: "1.0.0"
config-version: 2

profile: varejo_analytics

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  data_inicio: "2023-01-01"
  data_fim: "2024-12-31"
  moeda: "BRL"

models:
  varejo_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

seeds:
  varejo_analytics:
    +schema: seeds

snapshots:
  varejo_analytics:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at
